name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test -- --coverage
      - name: 上傳覆蓋率報告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov-report
      - name: 效能測試
        run: npx artillery run performance/load.yaml || true
      - name: 上傳效能報告
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: performance/report.json
